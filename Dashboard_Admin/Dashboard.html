<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCO Mala - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: {
                        'coco-pink':      '#eccac8',
                        'coco-blue':      '#4a86b0',
                        'coco-red':       '#dd5647',
                        'coco-salmon':    '#ef9a9a',
                        'coco-red-hover': '#c0392b',
                        'coco-green':     '#2ecc71',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-800 font-sans">
    <script src="../Login_Admin/admin-data.js"></script>
    <script>
        function doLogout() {
            logoutAdmin();
            window.location.href = '../Login_User/customerlogin.html';
        }
    </script>
    <script src="../Login_Admin/admin-data.js"></script>
    <script>
        function doLogout() {
            logoutAdmin();
            window.location.href = '../Login_User/customerlogin.html';
        }
    </script>

    <!-- Booking Detail Modal -->
    <div id="booking-modal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex justify-center items-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-[650px] p-10 relative border border-gray-100">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-coco-red hover:text-red-700 transition">
                <i class="fas fa-times-circle text-4xl"></i>
            </button>
            <div class="space-y-6 text-xl text-gray-800 mt-2">
                <div class="font-medium text-2xl mb-8">ชื่อผู้จอง : <span id="m-name" class="font-normal"></span></div>
                <div>เบอร์ : <span id="m-phone"></span></div>
                <div class="flex justify-between items-center">
                    <div>รหัสคิว : <span id="m-queue" class="font-medium text-2xl"></span></div>
                    <div id="m-date" class="text-gray-700 text-xl"></div>
                </div>
                <div class="mt-4">ลำดับโต๊ะ : <span id="m-table"></span></div>
                <div>เวลา : <span id="m-time"></span></div>
                <div class="pt-4">
                    <button id="approve-btn" onclick="approveBooking()"
                        class="hidden w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 rounded-xl transition">
                        ✓ อนุมัติยืนยันตัวตน
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="h-screen overflow-hidden flex flex-col">

        <header class="h-[70px] px-10 flex justify-between items-center border-b border-gray-100 bg-white flex-shrink-0">
            <div class="flex items-center text-lg font-semibold text-gray-700">
                <img src="../Logo-COCO/COCO Mala.jpg" alt="Logo" class="w-10 h-10 rounded-full bg-gray-200 object-cover mr-4 border border-gray-200">
                COCO Mala Booking
            </div>
            <a href="#" onclick="doLogout()" class="text-sm text-gray-600 hover:text-red-500 transition">ออกจากระบบ</a>
        </header>

        <div class="flex flex-grow overflow-hidden">

        <!-- Sidebar -->
        <nav class="w-[260px] bg-white pt-5 border-r border-gray-100 flex-shrink-0 flex flex-col">
            <div class="flex items-center py-3 px-5 mx-5 my-1 rounded-lg text-sm cursor-pointer transition bg-coco-pink text-black font-medium"
                 id="menu-queue" onclick="switchPage('queue')">
                <i class="fas fa-list w-8 text-base"></i> การแสดงคิว
            </div>
            <div class="flex items-center py-3 px-5 mx-5 my-1 rounded-lg text-sm cursor-pointer transition hover:bg-gray-50 text-gray-700"
                 id="menu-booking" onclick="switchPage('booking')">
                <i class="fas fa-file-alt w-8 text-base"></i> การกรอกรับคิว
            </div>
        </nav>

        <!-- Main content -->
        <main class="flex-grow flex flex-col bg-white">
            <div class="p-10 overflow-y-auto h-full">

                <!-- หน้าคิว -->
                <div id="page-queue">
                    <h1 class="text-4xl mb-10 font-medium text-gray-800">การรับคิว</h1>
                    <div class="w-full border border-gray-200 rounded-lg overflow-hidden">
                        <table class="w-full border-collapse text-sm">
                            <colgroup>
                                <col style="width:18%">
                                <col style="width:15%">
                                <col style="width:8%">
                                <col style="width:8%">
                                <col style="width:12%">
                                <col style="width:20%">
                                <col style="width:12%">
                            </colgroup>
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 border-b border-gray-200">
                                    <th class="px-5 py-4 font-medium text-center">ชื่อ</th>
                                    <th class="px-5 py-4 font-medium text-center">เบอร์</th>
                                    <th class="px-5 py-4 font-medium text-center">จำนวนคน</th>
                                    <th class="px-5 py-4 font-medium text-center">โต๊ะ</th>
                                    <th class="px-5 py-4 font-medium text-center">เวลา</th>
                                    <th class="px-5 py-4 font-medium text-center">สถานะ</th>
                                    <th class="px-5 py-4 font-medium text-center">ดำเนินการ</th>
                                </tr>
                            </thead>
                            <tbody id="queue-tbody" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                </div>

                <!-- หน้ากรอกรับคิว -->
                <div id="page-booking" class="hidden">
                    <h1 class="text-4xl mb-10 font-medium text-gray-800">การกรอกรับคิว</h1>
                    <div class="mt-12">
                        <label class="block text-lg mb-4 text-gray-700">กรุณากรอกเบอร์ของลูกค้าเพื่อยืนยันคิว</label>
                        <div class="mb-6">
                            <input type="text" id="booking-phone"
                                class="w-full max-w-[450px] p-4 text-lg border border-gray-300 rounded-lg outline-none text-gray-700 focus:border-coco-blue focus:ring-1 focus:ring-coco-blue placeholder-gray-400"
                                placeholder="เบอร์โทรศัพท์ 10 หลัก" maxlength="10"
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <button class="bg-coco-red text-white py-3 px-6 text-lg rounded-md hover:bg-coco-red-hover transition duration-200"
                            onclick="checkBooking()">ตรวจสอบข้อมูลการจอง</button>
                    </div>
                </div>

            </div>
        </main>
        </div>
    </div>

    <script>
        // --- DATABASE (ดึงจาก localStorage ที่ลูกค้าจองไว้) ---
        function getBookings() {
            const stored = localStorage.getItem('coco_bookings');
            return stored ? JSON.parse(stored) : [];
        }

        function saveBookings(bookings) {
            localStorage.setItem('coco_bookings', JSON.stringify(bookings));
        }

        // --- RENDER ตาราง ---
        function renderTable() {
            const bookings = getBookings();
            const tbody = document.getElementById('queue-tbody');
            tbody.innerHTML = '';

            if (bookings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-400">ยังไม่มีการจองคิว</td></tr>`;
                return;
            }

            bookings.forEach((b, index) => {
                const isCompleted = b.status === 'completed';
                const isCancelled = b.status === 'cancelled';
                if (isCancelled) return; // ไม่แสดงที่ยกเลิกแล้ว

                const isProcessing = b.status === 'processing';

                let statusBadge = '';
                if (isCompleted) {
                    statusBadge = `<span class="px-6 py-2 rounded-full text-sm inline-block min-w-[140px] text-center select-none bg-coco-blue text-white">เสร็จสิ้น</span>`;
                } else if (isProcessing) {
                    statusBadge = `<span class="status-badge px-6 py-2 rounded-full text-sm inline-block min-w-[140px] text-center cursor-pointer transition hover:opacity-80 select-none bg-orange-100 text-orange-700"
                            data-index="${index}" onclick="changeStatus(this)">กำลังดำเนินการ</span>`;
                } else {
                    statusBadge = `<span class="px-6 py-2 rounded-full text-sm inline-block min-w-[140px] text-center select-none bg-gray-100 text-gray-400">รอยืนยัน</span>`;
                }

                const skipBtn = (isCompleted || isProcessing)
                    ? ''
                    : `<button class="skip-btn text-gray-500 hover:text-gray-700 text-sm" onclick="skipRow(${index})">Skip</button>`;

                const row = document.createElement('tr');
                row.className = 'border-b border-gray-50 hover:bg-gray-50 transition';
                row.innerHTML = `
                    <td class="px-5 py-4 text-center cursor-pointer text-blue-600 hover:underline font-medium"
                        onclick="showModal(${index})">${b.name}</td>
                    <td class="px-5 py-4 text-center text-gray-600">${b.phone}</td>
                    <td class="px-5 py-4 text-center text-gray-600">${b.pax || '-'}</td>
                    <td class="px-5 py-4 text-center text-gray-600">${b.table || '-'}</td>
                    <td class="px-5 py-4 text-center text-gray-600">${b.time}</td>
                    <td class="px-5 py-4 text-center">${statusBadge}</td>
                    <td class="px-5 py-4 text-center">${skipBtn}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // --- เปลี่ยนสถานะ ---
        function changeStatus(element) {
            const index = parseInt(element.getAttribute('data-index'));
            const bookings = getBookings();
            if (bookings[index] && bookings[index].status !== 'completed') {
                bookings[index].status = 'completed';
                saveBookings(bookings);
                renderTable();
            }
        }

        // --- Skip (ยกเลิกจาก dashboard) ---
        function skipRow(index) {
            if (confirm('ต้องการข้ามคิวนี้ใช่หรือไม่?')) {
                const bookings = getBookings();
                if (bookings[index]) {
                    bookings[index].status = 'cancelled';
                    saveBookings(bookings);
                    renderTable();
                }
            }
        }

        // --- Modal ---
        function showModal(index) {
            const bookings = getBookings();
            const b = bookings[index];
            if (!b) return;

            const isCompleted = b.status === 'completed';
            document.getElementById('m-name').innerText  = b.name;
            document.getElementById('m-phone').innerText = b.phone;
            document.getElementById('m-date').innerText  = b.date || '-';
            document.getElementById('m-table').innerText = b.table || '-';
            document.getElementById('m-time').innerText  = b.time;

            const queueEl = document.getElementById('m-queue');
            if (isCompleted) {
                queueEl.innerText = 'Completed';
                queueEl.className = 'font-medium text-2xl text-coco-green';
            } else {
                queueEl.innerText = b.queue;
                queueEl.className = 'font-medium text-2xl text-coco-red';
            }

            // แสดง/ซ่อนปุ่มอนุมัติตามสถานะ
            const approveBtn = document.getElementById('approve-btn');
            if (b.status === 'active') {
                approveBtn.classList.remove('hidden');
                approveBtn.setAttribute('data-index', index);
            } else {
                approveBtn.classList.add('hidden');
            }

            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function approveBooking() {
            const approveBtn = document.getElementById('approve-btn');
            const index = parseInt(approveBtn.getAttribute('data-index'));
            const bookings = getBookings();
            if (bookings[index]) {
                bookings[index].status = 'processing';
                saveBookings(bookings);
                closeModal();
                renderTable();
            }
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.add('hidden');
        }

        // --- ตรวจสอบการจองจากเบอร์ ---
        function checkBooking() {
            const phone = document.getElementById('booking-phone').value;
            if (phone.length !== 10) {
                alert('กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลัก');
                return;
            }
            const bookings = getBookings();
            const index = bookings.findIndex(b => b.phone === phone && b.status !== 'cancelled');
            if (index !== -1) {
                showModal(index);
            } else {
                alert('ไม่พบข้อมูลการจองของเบอร์นี้');
            }
        }

        // --- สลับหน้า ---
        function switchPage(pageName) {
            ['queue', 'booking'].forEach(p => {
                document.getElementById('page-' + p).classList.add('hidden');
                const menu = document.getElementById('menu-' + p);
                menu.classList.remove('bg-coco-pink', 'text-black', 'font-medium');
                menu.classList.add('hover:bg-gray-50', 'text-gray-700');
            });
            document.getElementById('page-' + pageName).classList.remove('hidden');
            const active = document.getElementById('menu-' + pageName);
            active.classList.remove('hover:bg-gray-50', 'text-gray-700');
            active.classList.add('bg-coco-pink', 'text-black', 'font-medium');
        }

        // โหลดตารางตอนเปิดหน้า
        renderTable();
    </script>
</body>
</html>
