<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCO Mala Booking - ยืนยันตัวตน Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fcfcfc; }
        input::placeholder { color: #d1d5db; }
        .btn-verify { background-color: #ff8a80; transition: all 0.3s ease; }
        .btn-active { background-color: #ED3B2B !important; }
        .btn-error  { background-color: #FC938A !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-gray-200 py-4 px-6 flex justify-between items-center sticky top-0 bg-white z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full overflow-hidden border border-gray-200 flex-shrink-0">
                <img src="../Logo-COCO/COCO Mala.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-lg tracking-wide">COCO หม่าล่าทั่ง</span>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-[400px] bg-white rounded-[2.5rem] shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-50 p-10 flex flex-col items-center">
        <h1 class="text-[1.25rem] font-medium text-gray-700 mb-2 text-center">ยืนยันตัวตน Admin</h1>
        <p class="text-gray-400 text-sm mb-8 text-center">กรอกชื่อและเบอร์ที่ลงทะเบียนไว้</p>

        <div class="w-full space-y-6">
            <div class="space-y-2">
                <label class="block text-gray-800 text-sm ml-1">ชื่อ :</label>
                <input type="text" id="adminName" placeholder="ชื่อ (ไทยหรืออังกฤษ)"
                    class="w-full px-5 py-3.5 rounded-2xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-orange-300 bg-white text-gray-600 transition-all">
            </div>

            <div class="space-y-2">
                <label class="block text-gray-800 text-sm ml-1">เบอร์ :</label>
                <input type="tel" id="adminPhone" placeholder="เบอร์ (ตัวเลขเท่านั้น)"
                    class="w-full px-5 py-3.5 rounded-2xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-orange-300 bg-white text-gray-600 transition-all">
            </div>

            <div class="flex gap-4 pt-4">
                <a href="LoginAdmin.html"
                    class="w-1/2 bg-gray-200 hover:bg-gray-300 text-gray-500 font-medium py-3.5 rounded-2xl transition-all active:scale-[0.98] text-center flex items-center justify-center">
                    ยกเลิก
                </a>
                <button type="button" id="verifyBtn"
                    class="btn-verify w-1/2 text-white font-medium py-3.5 rounded-2xl shadow-sm transition-all active:scale-[0.98]">
                    ยืนยันตัวตน
                </button>
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-xs rounded-[2rem] p-8 flex flex-col items-center text-center">
            <h2 class="text-lg font-medium text-gray-800 mb-2">ข้อมูลไม่ถูกต้อง</h2>
            <p class="text-gray-500 text-sm mb-6 leading-relaxed">ชื่อหรือเบอร์ไม่ตรงกับที่ลงทะเบียนไว้</p>
            <button onclick="closeModal()" class="w-full bg-[#ED3B2B] hover:bg-[#d32f22] text-white py-3 rounded-xl shadow-sm transition-colors font-medium">ตกลง</button>
        </div>
    </div>

    <script src="admin-data.js"></script>
    <script>
        const nameInput  = document.getElementById('adminName');
        const phoneInput = document.getElementById('adminPhone');
        const verifyBtn  = document.getElementById('verifyBtn');
        const errorModal = document.getElementById('errorModal');

        function validateForm() {
            const name  = nameInput.value.trim();
            const phone = phoneInput.value.trim();
            verifyBtn.classList.remove('btn-error');
            if (name && phone) {
                verifyBtn.classList.add('btn-active');
            } else {
                verifyBtn.classList.remove('btn-active');
            }
        }

        nameInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^A-Za-zก-๙\s]/g, '');
            validateForm();
        });
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            validateForm();
        });

        verifyBtn.addEventListener('click', () => {
            const name  = nameInput.value.trim();
            const phone = phoneInput.value.trim();

            // ── ใช้ฟังก์ชันจาก admin-data.js ──
            if (verifyAdmin(name, phone)) {
                // ยืนยันสำเร็จ → บันทึก flag แล้วไปหน้าเปลี่ยนรหัส
                localStorage.setItem('adminVerified', 'true');
                window.location.href = 'Change.html';
            } else {
                errorModal.classList.remove('hidden');
                verifyBtn.classList.remove('btn-active');
                verifyBtn.classList.add('btn-error');
            }
        });

        function closeModal() {
            errorModal.classList.add('hidden');
            verifyBtn.classList.remove('btn-error');
            validateForm();
        }
    </script>
</body>
</html>
