<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - COCO Mala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fcfcfc; }
        input::placeholder { color: #d1d5db; }
        .btn-login  { background-color: #ff8a80; transition: all 0.3s ease; }
        .btn-active { background-color: #ED3B2B !important; }
        .btn-error  { background-color: #FC938A !important; }
        .error-text { color: #F46363; font-size: 0.75rem; margin-left: 0.25rem; display: none; }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- nav อยู่ระดับบนสุด ไม่ถูกห่อด้วย div ใด -->
    <nav class="border-b border-gray-200 py-4 px-6 flex justify-between items-center sticky top-0 bg-white z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full overflow-hidden border border-gray-200 flex-shrink-0">
                <img src="../Logo-COCO/COCO Mala.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-lg tracking-wide">COCO หม่าล่าทั่ง</span>
        </div>
    </nav>

    <!-- flex-grow ทำให้ส่วนนี้ขยายเต็มพื้นที่ที่เหลือ login card จะอยู่กลาง -->
    <div class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-[400px] bg-white rounded-[2.5rem] shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-50 p-10 flex flex-col items-center">
            <h1 class="text-[1.25rem] font-medium text-gray-700 mb-10 text-center">เข้าสู่ระบบสำหรับ Admin</h1>

            <div class="w-full space-y-6">
                <div class="space-y-1">
                    <label class="block text-gray-800 text-sm ml-1">ชื่อ :</label>
                    <input type="text" id="adminName" placeholder="กรอกชื่อ (ไทยหรืออังกฤษ)"
                        class="w-full px-5 py-3.5 rounded-2xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-orange-300 bg-white text-gray-600 transition-all">
                    <span id="nameError" class="error-text">กรุณากรอกข้อมูล</span>
                </div>

                <div class="space-y-1">
                    <label class="block text-gray-800 text-sm ml-1">เบอร์ :</label>
                    <input type="tel" id="adminPhone" placeholder="กรอกเบอร์ (ตัวเลขเท่านั้น)"
                        class="w-full px-5 py-3.5 rounded-2xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-orange-300 bg-white text-gray-600 transition-all">
                    <span id="phoneError" class="error-text">กรุณากรอกข้อมูล</span>
                </div>

                <div class="space-y-1">
                    <label class="block text-gray-800 text-sm ml-1">รหัส :</label>
                    <div class="relative">
                        <input type="password" id="adminPass" placeholder="กรอกรหัสผ่าน"
                            class="w-full px-5 py-3.5 rounded-2xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-orange-300 bg-white text-gray-600 transition-all pr-12">
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                            <i id="eyeIcon" data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <span id="passError" class="error-text">กรุณากรอกข้อมูล</span>
                </div>

                <div class="pt-4">
                    <button type="button" id="loginBtn"
                        class="btn-login w-full text-white font-medium py-3.5 rounded-2xl shadow-sm transition-all active:scale-[0.98]">
                        เข้าสู่ระบบ
                    </button>
                </div>

                <div class="text-center pt-2">
                    <a href="Forgot_Admin.html" class="text-gray-400 text-sm hover:text-gray-600 transition-colors">ลืมรหัสผ่าน?</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-xs rounded-[2rem] p-8 flex flex-col items-center text-center">
            <h2 class="text-lg font-medium text-gray-800 mb-2">ข้อมูลไม่ถูกต้อง</h2>
            <p class="text-gray-500 text-sm mb-6 leading-relaxed">กรุณาตรวจสอบชื่อ เบอร์ และรหัสผ่านอีกครั้ง</p>
            <button onclick="closeModal()"
                class="w-full bg-[#ED3B2B] hover:bg-[#d32f22] text-white py-3 rounded-xl shadow-sm transition-colors font-medium">ตกลง</button>
        </div>
    </div>

    <script src="admin-data.js"></script>
    <script>
        lucide.createIcons();

        const nameInput  = document.getElementById('adminName');
        const phoneInput = document.getElementById('adminPhone');
        const passInput  = document.getElementById('adminPass');
        const loginBtn   = document.getElementById('loginBtn');
        const eyeIcon    = document.getElementById('eyeIcon');
        const errorModal = document.getElementById('errorModal');
        const nameError  = document.getElementById('nameError');
        const phoneError = document.getElementById('phoneError');
        const passError  = document.getElementById('passError');

        function togglePassword() {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function validateForm() {
            const name  = nameInput.value.trim();
            const phone = phoneInput.value.trim();
            const pass  = passInput.value.trim();
            loginBtn.classList.remove('btn-error');
            if (name)  nameError.style.display  = 'none';
            if (phone) phoneError.style.display = 'none';
            if (pass)  passError.style.display  = 'none';
            if (name && phone && pass) {
                loginBtn.classList.add('btn-active');
            } else {
                loginBtn.classList.remove('btn-active');
            }
        }

        nameInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^A-Za-zก-๙\s]/g, '');
            validateForm();
        });
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            validateForm();
        });
        passInput.addEventListener('input', validateForm);

        loginBtn.addEventListener('click', () => {
            const name  = nameInput.value.trim();
            const phone = phoneInput.value.trim();
            const pass  = passInput.value;
            let hasEmpty = false;

            if (!name)  { nameError.style.display  = 'block'; hasEmpty = true; }
            if (!phone) { phoneError.style.display = 'block'; hasEmpty = true; }
            if (!pass)  { passError.style.display  = 'block'; hasEmpty = true; }
            if (hasEmpty) return;

            const result = loginAdmin(name, phone, pass);
            if (result.success) {
                window.location.href = 'AdminDashboard.html';
            } else {
                errorModal.classList.remove('hidden');
                loginBtn.classList.remove('btn-active');
                loginBtn.classList.add('btn-error');
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!errorModal.classList.contains('hidden')) {
                    closeModal();
                } else {
                    loginBtn.click();
                }
            }
        });

        function closeModal() {
            errorModal.classList.add('hidden');
            nameInput.value  = '';
            phoneInput.value = '';
            passInput.value  = '';
            nameError.style.display  = 'none';
            phoneError.style.display = 'none';
            passError.style.display  = 'none';
            loginBtn.classList.remove('btn-error', 'btn-active');
            passInput.type = 'password';
            eyeIcon.setAttribute('data-lucide', 'eye');
            lucide.createIcons();
        }
    </script>
</body>

</html>
